<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glacé | Accueil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --cream: #FFF9F2;
      --blush: #FCE4DB;
      --rose: #E56A4F;
      --choc: #3E2A21;
      --text-muted: #8E6E5A;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--choc);
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 6vw;
      background: rgba(255,249,242,0.95);
      backdrop-filter: blur(8px);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--choc);
    }
    .logo span { color: var(--rose); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 500; }
    .cart-link {
      background: var(--choc);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .cart-link:hover { background: var(--rose); }
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 100px 6vw 60px;
      gap: 2rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
    }
    .hero h1 em { color: var(--rose); font-style: italic; }
    .btn {
      background: var(--choc);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      display: inline-block;
    }
    .hero-img img {
      width: 100%;
      max-width: 400px;
      border-radius: 60% 40% 50% 50%;
      box-shadow: 0 20px 30px rgba(0,0,0,0.1);
    }
    .products {
      padding: 3rem 6vw;
    }
    .section-title {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 2rem;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }
    .card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-6px); }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card-info {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .add-btn {
      background: var(--choc);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }
    footer {
      background: var(--choc);
      text-align: center;
      padding: 1.5rem;
      color: rgba(255,255,255,0.6);
      margin-top: 2rem;
    }
    @media (max-width: 800px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .nav-links { display: none; }
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--choc);
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      transition: 0.3s;
      opacity: 0;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo">Glac<span>é</span></a>
  <ul class="nav-links">
    <li><a href="#">Accueil</a></li>
    <li><a href="#products">Saveurs</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <a href="cart.html" class="cart-link">🛒 Panier (<span id="cartCount">0</span>)</a>
</nav>

<section class="hero">
  <div>
    <div style="background:rgba(229,106,79,0.1); display:inline-block; padding:5px 15px; border-radius:40px;">✦ NOUVEAUTÉ</div>
    <h1>Trouvez votre<br><em>parfaite</em> douceur glacée</h1>
    <p style="color: var(--text-muted); margin: 1rem 0;">Artisanale, chaque boule est un voyage.</p>
    <button class="btn" id="heroAddBtn">✨ Ajouter au panier</button>
  </div>
  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1567206563114-c179706e6b3d?w=500&q=80" alt="Glace">
  </div>
</section>

<section id="products" class="products">
  <div class="section-title">Nos <span style="color: var(--rose);">signatures</span></div>
  <div class="product-grid" id="productGrid"></div>
</section>

<footer>❄️ Glacé — Marrakech, Maroc ❄️</footer>

<div class="toast" id="toastMsg">✓ Ajouté</div>

<script>
  // ---------- produits ----------
  const products = [
    { id: 'choco', name: 'Chocolat Belge', price: 55, img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&q=80' },
    { id: 'fraise', name: 'Fraise Sauvage', price: 50, img: 'https://images.unsplash.com/photo-1488900128323-21503983a07e?w=400&q=80' },
    { id: 'vanille', name: 'Vanille Madagascar', price: 48, img: 'https://images.unsplash.com/photo-1570197788417-0e82375c9371?w=400&q=80' }
  ];

  // ---------- fonctions panier (localStorage) ----------
  let cart = [];
  function loadCart() {
    const saved = localStorage.getItem('glace_cart');
    if (saved) try { cart = JSON.parse(saved); } catch(e) { cart = []; }
    else cart = [];
    updateCartCounter();
  }
  function saveCart() {
    localStorage.setItem('glace_cart', JSON.stringify(cart));
  }
  function updateCartCounter() {
    const total = cart.reduce((sum, item) => sum + item.quantity, 0);
    const countSpan = document.getElementById('cartCount');
    if (countSpan) countSpan.innerText = total;
  }
  function addToCart(product, qty = 1) {
    const existing = cart.find(p => p.id === product.id);
    if (existing) existing.quantity += qty;
    else cart.push({ ...product, quantity: qty });
    saveCart();
    updateCartCounter();
    showToast(`${product.name} ajouté`);
  }
  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = '✓ ' + msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // عرض المنتجات في الشبكة
  const grid = document.getElementById('productGrid');
  if (grid) {
    products.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${prod.img}" alt="${prod.name}" loading="lazy">
        <div class="card-info">
          <div><strong>${prod.name}</strong><br>${prod.price} د.م.</div>
          <button class="add-btn" data-id="${prod.id}" data-name="${prod.name}" data-price="${prod.price}">+</button>
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        const price = parseInt(btn.dataset.price);
        addToCart({ id, name, price }, 1);
      });
    });
  }

  // produit principal
  const heroBtn = document.getElementById('heroAddBtn');
  if (heroBtn) {
    heroBtn.addEventListener('click', () => {
      addToCart({ id: 'main', name: 'Glacé Signature', price: 69 }, 1);
    });
  }

  loadCart();
</script>
</body>
</html>
