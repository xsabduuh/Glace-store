<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Glacé | Mon panier</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FFF8F0;
      --soft-pink: #FCE4DB;
      --rose: #E56A4F;
      --rose-deep: #C9442C;
      --choc: #3E2A21;
      --choc-light: #5C3E2E;
      --text-light: #8E6E5A;
      --gold: #E9C46A;
      --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 25px 45px rgba(62, 42, 33, 0.15);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--choc);
      padding: 2rem;
    }

    .cart-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* header */
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .cart-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--choc);
    }
    .back-link {
      background: var(--choc);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .back-link:hover {
      background: var(--rose);
      transform: translateX(-4px);
    }

    /* layout grid */
    .cart-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }

    /* liste des articles */
    .cart-items {
      background: white;
      border-radius: 32px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cart-item-img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-details h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .cart-item-price {
      color: var(--rose);
      font-weight: 600;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .qty-btn {
      background: var(--soft-pink);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .qty-btn:hover {
      background: var(--rose);
      color: white;
    }
    .item-qty {
      font-weight: 600;
      min-width: 30px;
      text-align: center;
    }
    .remove-item {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-light);
      transition: 0.2s;
    }
    .remove-item:hover {
      color: var(--rose-deep);
      transform: scale(1.1);
    }

    /* résumé + coupon */
    .cart-summary {
      background: white;
      border-radius: 32px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      height: fit-content;
      position: sticky;
      top: 2rem;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .summary-total {
      font-weight: 800;
      font-size: 1.3rem;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }
    .coupon-section {
      margin: 1.5rem 0;
      display: flex;
      gap: 8px;
    }
    .coupon-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 60px;
      font-family: inherit;
    }
    .apply-coupon {
      background: var(--choc-light);
      border: none;
      padding: 0 20px;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .whatsapp-order {
      background: #25D366;
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: 0.2s;
    }
    .whatsapp-order:hover {
      background: #128C7E;
      transform: scale(0.98);
    }
    .clear-cart {
      background: transparent;
      border: 1px solid var(--text-light);
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .clear-cart:hover {
      background: var(--rose);
      color: white;
      border-color: var(--rose);
    }
    .empty-cart {
      text-align: center;
      padding: 3rem;
      color: var(--text-light);
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--choc);
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      z-index: 1000;
      transition: 0.3s;
      opacity: 0;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 800px) {
      body { padding: 1rem; }
      .cart-grid { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
  </style>
</head>
<body>

<div class="cart-container">
  <div class="cart-header">
    <h1>🛒 Votre panier</h1>
    <a href="index.html" class="back-link">← Continuer mes achats</a>
  </div>

  <div class="cart-grid">
    <!-- liste des produits -->
    <div class="cart-items" id="cartItemsList">
      <div class="empty-cart">🍃 Votre panier est vide</div>
    </div>

    <!-- résumé et actions -->
    <div class="cart-summary">
      <div class="summary-row">
        <span>Sous-total</span>
        <span id="subtotal">0 د.م.</span>
      </div>
      <div class="summary-row">
        <span>Réduction</span>
        <span id="discountAmount">0 د.م.</span>
      </div>
      <div class="summary-row summary-total">
        <span>Total</span>
        <span id="totalPrice">0 د.م.</span>
      </div>

      <div class="coupon-section">
        <input type="text" id="couponCode" class="coupon-input" placeholder="Code promo (GLACE10)">
        <button id="applyCouponBtn" class="apply-coupon">Appliquer</button>
      </div>

      <button id="whatsappOrderBtn" class="whatsapp-order">
        📱 Commander via WhatsApp
      </button>
      <button id="clearCartBtn" class="clear-cart">
        🗑️ Vider le panier
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toastMsg">✓ Panier mis à jour</div>

<script>
  // ---------- STATE ----------
  let cart = [];
  let discountPercent = 0; // 0 pour 0%, 10 pour 10% etc.
  let couponApplied = false;

  // DOM elements
  const cartContainer = document.getElementById('cartItemsList');
  const subtotalSpan = document.getElementById('subtotal');
  const discountSpan = document.getElementById('discountAmount');
  const totalSpan = document.getElementById('totalPrice');
  const toast = document.getElementById('toastMsg');

  // ---------- HELPERS ----------
  function showToast(msg) {
    toast.innerText = '✓ ' + msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function saveCart() {
    localStorage.setItem('glace_cart', JSON.stringify(cart));
  }

  function loadCart() {
    const saved = localStorage.getItem('glace_cart');
    if (saved) {
      try { cart = JSON.parse(saved); } catch(e) { cart = []; }
    } else {
      cart = [];
    }
    renderCart();
  }

  // calcul des totaux avec remise
  function computeTotals() {
    let subtotal = 0;
    cart.forEach(item => { subtotal += item.price * item.quantity; });
    let discount = (subtotal * discountPercent) / 100;
    let total = subtotal - discount;
    return { subtotal, discount, total };
  }

  // mise à jour de l'affichage des totaux
  function updateTotalsDisplay() {
    const { subtotal, discount, total } = computeTotals();
    subtotalSpan.innerText = subtotal + ' د.م.';
    discountSpan.innerText = discount + ' د.م.';
    totalSpan.innerText = total + ' د.م.';
  }

  // affichage de la liste des articles
  function renderCart() {
    if (!cartContainer) return;
    if (cart.length === 0) {
      cartContainer.innerHTML = '<div class="empty-cart">🍃 Votre panier est vide</div>';
      updateTotalsDisplay();
      return;
    }

    let html = '';
    cart.forEach((item, idx) => {
      html += `
        <div class="cart-item" data-index="${idx}">
          <img class="cart-item-img" src="${item.img || 'https://images.unsplash.com/photo-1567206563114-c179706e6b3d?w=100&q=80'}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1567206563114-c179706e6b3d?w=100&q=80'">
          <div class="cart-item-details">
            <h3>${escapeHtml(item.name)}</h3>
            <div class="cart-item-price">${item.price} د.م.</div>
            <div class="cart-item-actions">
              <button class="qty-btn" data-idx="${idx}" data-delta="-1">−</button>
              <span class="item-qty">${item.quantity}</span>
              <button class="qty-btn" data-idx="${idx}" data-delta="1">+</button>
              <button class="remove-item" data-idx="${idx}">🗑️</button>
            </div>
          </div>
        </div>
      `;
    });
    cartContainer.innerHTML = html;
    updateTotalsDisplay();

    // Attach events
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.dataset.idx);
        const delta = parseInt(btn.dataset.delta);
        if (cart[idx]) {
          let newQty = cart[idx].quantity + delta;
          if (newQty <= 0) {
            cart.splice(idx, 1);
          } else {
            cart[idx].quantity = newQty;
          }
          saveCart();
          renderCart();
          showToast('Panier mis à jour');
        }
      });
    });
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        cart.splice(idx, 1);
        saveCart();
        renderCart();
        showToast('Article retiré');
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ---------- COUPON ----------
  function applyCoupon(code) {
    if (code === 'GLACE10') {
      discountPercent = 10;
      couponApplied = true;
      showToast('Code promo appliqué : -10%');
      renderCart(); // refresh totals
    } else {
      showToast('Code invalide');
    }
  }

  // ---------- WHATSAPP ORDER (amélioré) ----------
  function sendWhatsAppOrder() {
    if (cart.length === 0) {
      showToast('Votre panier est vide');
      return;
    }
    const { subtotal, discount, total } = computeTotals();
    let message = "🍦 *Commande Glacé* 🍦\n\n";
    cart.forEach(item => {
      message += `• ${item.name} x${item.quantity} → ${item.price * item.quantity} د.م.\n`;
    });
    message += `\n📊 Sous-total : ${subtotal} د.م.`;
    if (discount > 0) message += `\n🎁 Réduction : -${discount} د.م.`;
    message += `\n💰 *Total : ${total} د.م.*\n\nMerci de confirmer votre commande.`;
    const encoded = encodeURIComponent(message);
    // Numéro WhatsApp (modifiable)
    const phone = "212612345678";
    window.open(`https://wa.me/${phone}?text=${encoded}`, '_blank');
  }

  // ---------- VIDER LE PANIER ----------
  function clearCart() {
    if (cart.length === 0) return;
    if (confirm('Voulez-vous vraiment vider votre panier ?')) {
      cart = [];
      discountPercent = 0;
      couponApplied = false;
      document.getElementById('couponCode').value = '';
      saveCart();
      renderCart();
      showToast('Panier vidé');
    }
  }

  // ---------- INITIALISATION ----------
  document.getElementById('applyCouponBtn').addEventListener('click', () => {
    const code = document.getElementById('couponCode').value.trim().toUpperCase();
    applyCoupon(code);
  });
  document.getElementById('whatsappOrderBtn').addEventListener('click', sendWhatsAppOrder);
  document.getElementById('clearCartBtn').addEventListener('click', clearCart);

  loadCart();

  // Mettre à jour le compteur dans localStorage pour l'index si besoin (optionnel)
  window.addEventListener('storage', (e) => {
    if (e.key === 'glace_cart') {
      loadCart();
    }
  });
</script>
</body>
</html>
