<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glacé | Mon panier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --cream: #FFF9F2;
      --blush: #FCE4DB;
      --rose: #E56A4F;
      --choc: #3E2A21;
      --text-muted: #8E6E5A;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--choc);
      padding: 2rem;
    }
    .cart-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .cart-header {
      background: var(--choc);
      color: white;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-home {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
    }
    .cart-items {
      padding: 1.5rem;
      min-height: 300px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 1rem 0;
    }
    .cart-item-info h3 {
      font-size: 1.1rem;
    }
    .cart-item-price {
      color: var(--rose);
      font-weight: bold;
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      background: var(--blush);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .remove-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #999;
    }
    .cart-footer {
      background: #faf7f2;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #eee;
    }
    .total {
      font-size: 1.4rem;
      font-weight: bold;
    }
    .checkout-btn {
      background: var(--choc);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
    .empty-cart {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--choc);
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      transition: 0.3s;
      opacity: 0;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .cart-footer { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

<div class="cart-container">
  <div class="cart-header">
    <h2>🛒 Mon panier</h2>
    <a href="index.html" class="back-home">← Continuer mes achats</a>
  </div>
  <div class="cart-items" id="cartItemsList">
    <div class="empty-cart">🛍️ Votre panier est vide</div>
  </div>
  <div class="cart-footer">
    <div class="total">Total : <span id="cartTotal">0</span> د.م.</div>
    <button class="checkout-btn" id="checkoutBtn">Passer la commande</button>
  </div>
</div>

<div class="toast" id="toastMsg">✓ Mis à jour</div>

<script>
  let cart = [];

  function loadCart() {
    const saved = localStorage.getItem('glace_cart');
    if (saved) {
      try { cart = JSON.parse(saved); } catch(e) { cart = []; }
    } else {
      cart = [];
    }
    renderCart();
  }

  function saveCart() {
    localStorage.setItem('glace_cart', JSON.stringify(cart));
    renderCart(); // mise à jour après chaque modification
  }

  function renderCart() {
    const container = document.getElementById('cartItemsList');
    const totalSpan = document.getElementById('cartTotal');
    if (!container) return;

    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">🛍️ Votre panier est vide</div>';
      totalSpan.innerText = '0';
      return;
    }

    let html = '';
    let total = 0;
    cart.forEach((item, idx) => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      html += `
        <div class="cart-item" data-index="${idx}">
          <div class="cart-item-info">
            <h3>${escapeHtml(item.name)}</h3>
            <div class="cart-item-price">${item.price} د.م.</div>
          </div>
          <div class="cart-item-controls">
            <button class="qty-btn" data-index="${idx}" data-delta="-1">−</button>
            <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
            <button class="qty-btn" data-index="${idx}" data-delta="1">+</button>
            <button class="remove-btn" data-index="${idx}">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    totalSpan.innerText = total;

    // ربط الأحداث
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.dataset.index);
        const delta = parseInt(btn.dataset.delta);
        if (cart[idx]) {
          let newQty = cart[idx].quantity + delta;
          if (newQty <= 0) {
            cart.splice(idx, 1);
          } else {
            cart[idx].quantity = newQty;
          }
          saveCart();
          showToast('Panier mis à jour');
        }
      });
    });
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        cart.splice(idx, 1);
        saveCart();
        showToast('Article retiré');
      });
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = '✓ ' + msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // validation de commande
  document.getElementById('checkoutBtn').addEventListener('click', () => {
    if (cart.length === 0) {
      showToast('Panier vide');
    } else {
      showToast('Merci ! Commande simulée');
      // Optionnel: vider le panier
      // cart = []; saveCart();
    }
  });

  loadCart();
</script>
</body>
</html>
