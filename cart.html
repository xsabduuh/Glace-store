:root {
  --bg-dark:      #141010;
  --bg-card:      #1E1818;
  --bg-elevated:  #2A2222;
  --coral:        #E8855A;
  --coral-light:  #F0A080;
  --orange:       #FF8C42;
  --gold:         #E8A87C;
  --text-white:   #FFFFFF;
  --text-light:   #B8A898;
  --text-muted:   #7A6A60;
  --border:       rgba(232, 133, 90, 0.25);
  --shadow-coral: 0 0 20px rgba(232, 133, 90, 0.3);
  --transition:   all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text-white);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Warm ambient glow - matches main page */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(232, 133, 90, 0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, rgba(255, 140, 66, 0.05) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ========== HEADER ========== */
.cart-header-page {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 6vw;
  background: rgba(20, 16, 16, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 2rem;
  color: var(--coral);
  letter-spacing: -0.02em;
  text-decoration: none;
}

.cart-header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-light);
  font-size: 0.95rem;
  font-weight: 500;
}

.cart-count-badge {
  background: linear-gradient(135deg, var(--coral), var(--orange));
  color: white;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
  box-shadow: var(--shadow-coral);
}

.back-home {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text-light);
  text-decoration: none;
  padding: 9px 20px;
  border-radius: 40px;
  font-weight: 500;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
}
.back-home:hover {
  border-color: var(--coral);
  color: var(--coral);
  transform: translateX(4px);
}

/* ========== MAIN CONTENT ========== */
.cart-main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 5vw;
  position: relative;
  z-index: 1;
}

.page-heading {
  margin-bottom: 2rem;
}
.page-heading h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 0.3rem;
}
.page-heading p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.cart-grid {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 1.5rem;
  align-items: start;
}

/* ========== CART ITEMS SECTION ========== */
.cart-items-section {
  background: var(--bg-card);
  border-radius: 28px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.cart-items-header {
  display: grid;
  grid-template-columns: 3fr 1fr 1.2fr 1fr 40px;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.cart-items-body {
  padding: 1rem;
}

.cart-item {
  display: grid;
  grid-template-columns: 3fr 1fr 1.2fr 1fr 40px;
  align-items: center;
  padding: 1rem;
  border-radius: 18px;
  margin-bottom: 0.5rem;
  transition: var(--transition);
  animation: fadeInUp 0.4s ease both;
}
.cart-item:nth-child(1) { animation-delay: 0.05s; }
.cart-item:nth-child(2) { animation-delay: 0.10s; }
.cart-item:nth-child(3) { animation-delay: 0.15s; }
.cart-item:nth-child(4) { animation-delay: 0.20s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cart-item:hover {
  background: rgba(232, 133, 90, 0.06);
}
.cart-item:last-child {
  margin-bottom: 0;
}

.cart-item-product {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.cart-item-img-wrap {
  position: relative;
  flex-shrink: 0;
}
.cart-item-img {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  object-fit: cover;
  border: 1.5px solid rgba(232, 133, 90, 0.2);
}

.cart-item-info {}
.cart-item-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text-white);
  margin-bottom: 3px;
}
.cart-item-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
}

.cart-item-price {
  color: var(--text-light);
  font-weight: 500;
  font-size: 0.95rem;
}

.cart-item-quantity {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-elevated);
  border-radius: 40px;
  padding: 5px;
  width: fit-content;
}
.qty-btn-cart {
  background: transparent;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  color: var(--text-light);
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.qty-btn-cart:hover {
  background: var(--coral);
  color: white;
}
.qty-display {
  min-width: 28px;
  text-align: center;
  font-weight: 600;
  font-size: 0.9rem;
}

.cart-item-total {
  font-weight: 700;
  color: var(--coral);
  font-size: 0.95rem;
}

.remove-item-btn {
  background: none;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1rem;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.remove-item-btn:hover {
  color: #ff6b6b;
  background: rgba(255, 107, 107, 0.12);
}

/* Empty cart */
.empty-cart {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-cart-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  opacity: 0.6;
}
.empty-cart p {
  font-size: 1rem;
  margin-bottom: 1.5rem;
}
.empty-cart a {
  color: var(--coral);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  border: 1.5px solid var(--border);
  padding: 10px 24px;
  border-radius: 40px;
  transition: 0.2s;
  display: inline-block;
}
.empty-cart a:hover {
  border-color: var(--coral);
  background: rgba(232, 133, 90, 0.08);
}

/* ========== CART SUMMARY ========== */
.cart-summary {
  background: var(--bg-card);
  border-radius: 28px;
  border: 1px solid var(--border);
  padding: 1.8rem;
  position: sticky;
  top: 90px;
  height: fit-content;
}

.summary-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-white);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.9rem;
  font-size: 0.9rem;
}
.summary-row span:first-child {
  color: var(--text-muted);
}
.summary-row span:last-child {
  color: var(--text-light);
  font-weight: 500;
}

.discount-badge {
  color: #4ade80 !important;
}

.summary-divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin: 1rem 0;
}

.summary-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}
.summary-total-row span:first-child {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text-white);
}
.summary-total-price {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--coral);
}

/* Coupon */
.coupon-section {
  margin-bottom: 1.2rem;
}
.coupon-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.coupon-row {
  display: flex;
  gap: 8px;
}
.coupon-input {
  flex: 1;
  background: var(--bg-elevated);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 11px 16px;
  color: white;
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: 0.2s;
}
.coupon-input::placeholder {
  color: var(--text-muted);
}
.coupon-input:focus {
  border-color: var(--coral);
}
.apply-coupon {
  background: linear-gradient(135deg, var(--coral), var(--orange));
  border: none;
  padding: 0 18px;
  border-radius: 12px;
  color: white;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: 0.2s;
  white-space: nowrap;
}
.apply-coupon:hover {
  opacity: 0.9;
  transform: scale(0.98);
}

/* Buttons */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.whatsapp-order-cart {
  width: 100%;
  background: #25D366;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 0.95rem;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
}
.whatsapp-order-cart:hover {
  background: #128C7E;
  transform: translateY(-2px);
}

.checkout-cart-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--coral), var(--orange));
  color: white;
  border: none;
  padding: 15px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 0.95rem;
  font-family: inherit;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 20px rgba(232, 133, 90, 0.3);
}
.checkout-cart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(232, 133, 90, 0.4);
}

.clear-cart-btn {
  width: 100%;
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.08);
  color: var(--text-muted);
  padding: 12px;
  border-radius: 14px;
  font-weight: 500;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: 0.2s;
}
.clear-cart-btn:hover {
  border-color: rgba(255, 107, 107, 0.4);
  color: #ff6b6b;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-elevated);
  color: var(--text-white);
  padding: 12px 24px;
  border-radius: 40px;
  z-index: 3000;
  transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  opacity: 0;
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  font-weight: 500;
  font-size: 0.9rem;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .cart-grid {
    grid-template-columns: 1fr;
  }
  .cart-items-header {
    display: none;
  }
  .cart-item {
    grid-template-columns: 1fr;
    gap: 12px;
    text-align: center;
    padding: 1.2rem;
  }
  .cart-item-product {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .cart-item-quantity {
    margin: 0 auto;
  }
  .cart-summary {
    position: static;
  }
}

@media (max-width: 520px) {
  .cart-header-page {
    padding: 1rem 4vw;
  }
  .cart-main {
    padding: 1.5rem 4vw;
  }
  .header-logo {
    font-size: 1.6rem;
  }
  .back-home {
    padding: 8px 14px;
    font-size: 0.82rem;
  }
  .cart-summary {
    padding: 1.4rem;
  }
  .summary-total-price {
    font-size: 1.3rem;
  }
}

<script>
  (function() {
    var cart = [];
    var discountPercent = 0;
    var couponApplied = false;

    var coupons = {
      'GLACE10':  10,
      'GLACE20':  20,
      'WELCOME':  15
    };

    var container      = document.getElementById('cartItemsContainer');
    var subtotalSpan   = document.getElementById('subtotal');
    var discountSpan   = document.getElementById('discountAmount');
    var discountRow    = document.getElementById('discountRow');
    var taxSpan        = document.getElementById('taxAmount');
    var totalSpan      = document.getElementById('totalPrice');
    var toast          = document.getElementById('toastMsg');
    var couponInput    = document.getElementById('couponCode');
    var headerCount    = document.getElementById('headerCartCount');
    var subHeading     = document.getElementById('cartSubHeading');

    function showToast(msg) {
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function fmt(n) {
      return Math.round(n * 100) / 100;
    }

    function loadCart() {
      var saved = localStorage.getItem('glace_cart');
      if (saved) {
        try { cart = JSON.parse(saved); } catch(e) { cart = []; }
      }
      renderCart();
    }

    function saveCart() {
      localStorage.setItem('glace_cart', JSON.stringify(cart));
      renderCart();
    }

    function calculateTotals() {
      var subtotal = 0;
      for (var i = 0; i < cart.length; i++) {
        subtotal += cart[i].price * cart[i].quantity;
      }
      var discount     = fmt((subtotal * discountPercent) / 100);
      var afterDiscount = subtotal - discount;
      var tax          = fmt(afterDiscount * 0.20);
      var total        = fmt(afterDiscount + tax);
      return { subtotal: subtotal, discount: discount, tax: tax, total: total };
    }

    function updateTotals() {
      var t = calculateTotals();
      subtotalSpan.innerText  = fmt(t.subtotal) + ' د.م.';
      taxSpan.innerText       = t.tax + ' د.م.';
      totalSpan.innerText     = t.total + ' د.م.';
      if (t.discount > 0) {
        discountSpan.innerText = '-' + t.discount + ' د.م.';
        discountRow.style.display = 'flex';
      } else {
        discountRow.style.display = 'none';
      }
    }

    function renderCart() {
      if (!container) return;

      var totalItems = 0;
      for (var i = 0; i < cart.length; i++) { totalItems += cart[i].quantity; }
      if (headerCount) headerCount.innerText = totalItems;

      if (cart.length === 0) {
        if (subHeading) subHeading.innerText = 'لا توجد منتجات بعد';
        container.innerHTML = '<div class="empty-cart"><div class="empty-cart-icon">🍦</div><p>سلة التسوق فارغة</p><a href="index.html">اكتشف النكهات \u2190</a></div>';
        updateTotals();
        return;
      }

      if (subHeading) subHeading.innerText = totalItems + ' منتج' + (totalItems > 1 ? ' في سلتك' : ' في سلتك');

      var html = '';
      for (var j = 0; j < cart.length; j++) {
        var item = cart[j];
        var itemTotal = fmt(item.price * item.quantity);
        var imgSrc = item.img || 'https://images.unsplash.com/photo-1567206563114-c179706e6b3d?w=120&q=80';
        html += '<div class="cart-item" data-index="' + j + '">' +
          '<div class="cart-item-product">' +
            '<div class="cart-item-img-wrap">' +
              '<img class="cart-item-img" src="' + escapeHtml(imgSrc) + '" alt="' + escapeHtml(item.name) + '" onerror="this.src=\'https://images.unsplash.com/photo-1567206563114-c179706e6b3d?w=120&q=80\'">' +
            '</div>' +
            '<div class="cart-item-info">' +
              '<div class="cart-item-name">' + escapeHtml(item.name) + '</div>' +
              '<div class="cart-item-sub">آيس كريم فاخر</div>' +
            '</div>' +
          '</div>' +
          '<div class="cart-item-price">' + item.price + ' د.م.</div>' +
          '<div class="cart-item-quantity">' +
            '<button class="qty-btn-cart" data-idx="' + j + '" data-delta="-1">−</button>' +
            '<span class="qty-display">' + item.quantity + '</span>' +
            '<button class="qty-btn-cart" data-idx="' + j + '" data-delta="1">+</button>' +
          '</div>' +
          '<div class="cart-item-total">' + itemTotal + ' د.م.</div>' +
          '<button class="remove-item-btn" data-idx="' + j + '">✕</button>' +
        '</div>';
      }

      container.innerHTML = html;
      updateTotals();

      // Qty buttons
      var qtyBtns = document.querySelectorAll('.qty-btn-cart');
      for (var k = 0; k < qtyBtns.length; k++) {
        (function(btn) {
          btn.addEventListener('click', function() {
            var idx   = parseInt(btn.getAttribute('data-idx'));
            var delta = parseInt(btn.getAttribute('data-delta'));
            if (cart[idx]) {
              var newQty = cart[idx].quantity + delta;
              if (newQty <= 0) {
                cart.splice(idx, 1);
                showToast('تم إزالة المنتج');
              } else {
                cart[idx].quantity = newQty;
                showToast('تم تحديث الكمية ✓');
              }
              saveCart();
            }
          });
        })(qtyBtns[k]);
      }

      // Remove buttons
      var removeBtns = document.querySelectorAll('.remove-item-btn');
      for (var m = 0; m < removeBtns.length; m++) {
        (function(btn) {
          btn.addEventListener('click', function() {
            var idx = parseInt(btn.getAttribute('data-idx'));
            cart.splice(idx, 1);
            saveCart();
            showToast('تم إزالة المنتج');
          });
        })(removeBtns[m]);
      }
    }

    // Coupon
    function applyCoupon(code) {
      var upper = code.toUpperCase();
      if (coupons[upper]) {
        discountPercent = coupons[upper];
        couponApplied   = true;
        showToast('خصم ' + discountPercent + '% تم تطبيقه 🎉');
        renderCart();
      } else {
        showToast('كود الخصم غير صالح');
      }
    }

    // Clear cart
    function clearCart() {
      if (cart.length === 0) { showToast('السلة فارغة بالفعل'); return; }
      if (confirm('هل أنت متأكد من تفريغ السلة؟')) {
        cart = [];
        discountPercent = 0;
        couponApplied   = false;
        if (couponInput) couponInput.value = '';
        saveCart();
        showToast('تم تفريغ السلة');
      }
    }

    // WhatsApp
    function sendWhatsApp() {
      if (cart.length === 0) { showToast('السلة فارغة'); return; }
      var t = calculateTotals();
      var msg = '\uD83C\uDF66 *طلب جديد من Glacé* \uD83C\uDF66\n\n';
      msg += '\u2015 \u2015 \u2015 \u2015 \u2015 \u2015 \u2015 \u2015\n';
      for (var i = 0; i < cart.length; i++) {
        var item = cart[i];
        msg += '\u2022 ' + item.name + '\n  ' + item.quantity + ' \u00D7 ' + item.price + ' \u062F.\u0645. = ' + fmt(item.price * item.quantity) + ' \u062F.\u0645.\n';
      }
      msg += '\u2015 \u2015 \u2015 \u2015 \u2015 \u2015 \u2015 \u2015\n';
      msg += '\uD83D\uDCCA المجموع: ' + t.subtotal + ' \u062F.\u0645.\n';
      if (t.discount > 0) msg += '\uD83C\uDF81 الخصم: -' + t.discount + ' \u062F.\u0645. (' + discountPercent + '%)\n';
      msg += '\uD83D\uDCB0 *الإجمالي: ' + t.total + ' \u062F.\u0645.*\n\n';
      msg += '\uD83D\uDCCD مراكش، المغرب\n';
      msg += '_شكراً لاختياركم Glacé_ \u2764\uFE0F\u200D\uD83D\uDD25';
      window.open('https://wa.me/212612345678?text=' + encodeURIComponent(msg), '_blank');
    }

    // Checkout
    function checkout() {
      if (cart.length === 0) { showToast('السلة فارغة'); return; }
      showToast('شكراً! سيتم معالجة طلبك 🎉');
    }

    // Events
    var applyBtn = document.getElementById('applyCouponBtn');
    if (applyBtn) {
      applyBtn.addEventListener('click', function() {
        var code = couponInput ? couponInput.value.trim() : '';
        if (code) applyCoupon(code);
        else showToast('أدخل كود الخصم أولاً');
      });
    }

    var clearBtn = document.getElementById('clearCartBtn');
    if (clearBtn) clearBtn.addEventListener('click', clearCart);

    var waBtn = document.getElementById('whatsappOrderCartBtn');
    if (waBtn) waBtn.addEventListener('click', sendWhatsApp);

    var checkBtn = document.getElementById('checkoutCartBtn');
    if (checkBtn) checkBtn.addEventListener('click', checkout);

    // Init
    loadCart();
  })();
</script>

</body>
</html>
